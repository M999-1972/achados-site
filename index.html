<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔥 Top Ofertas do Dia</title>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  margin: 0;
}

header {
  background: #ffe600;
  padding: 15px;
  text-align: center;
}

.urgencia {
  background: red;
  color: white;
  padding: 8px;
  text-align: center;
}

input {
  padding: 10px;
  width: 60%;
  border-radius: 5px;
  border: none;
}

button {
  padding: 10px;
  background: #3483fa;
  color: white;
  border: none;
  border-radius: 5px;
}

.container {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 15px;
  padding: 15px;
}

.card {
  background: white;
  border-radius: 10px;
  padding: 10px;
  text-align: center;
  position: relative;
}

.badge {
  position: absolute;
  top: 10px;
  left: 10px;
  background: red;
  color: white;
  font-size: 12px;
  padding: 3px 6px;
  border-radius: 5px;
}

.card img {
  width: 100%;
  height: 150px;
  object-fit: contain;
}

.price {
  color: green;
  font-weight: bold;
}

.link {
  display: block;
  margin-top: 10px;
  padding: 10px;
  background: #00a650;
  color: white;
  text-decoration: none;
  border-radius: 5px;
}
</style>
</head>

<body>

<header>
  <h1>🔥 TOP OFERTAS</h1>
  <input id="busca" placeholder="Buscar..." 
    onkeypress="if(event.key==='Enter'){buscarClick()}">
  <button onclick="buscarClick()">Buscar</button>
</header>

<div class="urgencia">
⏰ Atualizando ofertas automaticamente...
</div>

<div class="container" id="produtos"></div>

<script>

const afiliado = "https://www.mercadolivre.com.br/social/m999";

let buscas = [
  "fone bluetooth",
  "smartwatch",
  "acessórios moto",
  "promoções",
  "tecnologia"
];

let indexBusca = 0;
let carregando = false;

// função principal
async function buscar(termo = "promoções") {

  if (carregando) return; // evita travar
  carregando = true;

  document.getElementById("produtos").innerHTML = "Carregando...";

  try {
    let res = await fetch(`https://api.mercadolibre.com/sites/MLB/search?q=${termo}`);
    let data = await res.json();

    if (!data.results || data.results.length === 0) {
      document.getElementById("produtos").innerHTML = "Nenhum produto encontrado";
      carregando = false;
      return;
    }

    let html = "";

    data.results.slice(0, 10).forEach((p, i) => {

      let link = `${afiliado}?url=${encodeURIComponent(p.permalink)}`;

      html += `
      <div class="card">
        <div class="badge">TOP ${i+1}</div>
        <img src="${p.thumbnail}">
        <h4>${p.title}</h4>
        <p class="price">R$ ${p.price}</p>
        <a class="link" href="${link}" target="_blank">COMPRAR</a>
      </div>
      `;
    });

    document.getElementById("produtos").innerHTML = html;

  } catch (erro) {
    document.getElementById("produtos").innerHTML =
      "Erro ao carregar. Tentando novamente...";
  }

  carregando = false;
}

// botão
function buscarClick() {
  let termo = document.getElementById("busca").value.trim();
  buscar(termo || "promoções");
}

// 🔁 ROTAÇÃO CORRETA (EM LOOP CONTROLADO)
async function rotacaoAutomatica() {
  while (true) {
    await buscar(buscas[indexBusca]);

    indexBusca = (indexBusca + 1) % buscas.length;

    // espera 20s ANTES da próxima busca
    await new Promise(r => setTimeout(r, 20000));
  }
}

// iniciar
buscar();
rotacaoAutomatica();

</script>

</body>
</html>
