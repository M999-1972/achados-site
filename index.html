<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔥 Top Ofertas do Dia</title>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  margin: 0;
}

header {
  background: #ffe600;
  padding: 15px;
  text-align: center;
}

.urgencia {
  background: red;
  color: white;
  padding: 8px;
  font-size: 14px;
  text-align: center;
}

.search-box {
  margin-top: 10px;
}

input {
  padding: 10px;
  width: 60%;
  border-radius: 5px;
  border: none;
}

button {
  padding: 10px;
  background: #3483fa;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

.container {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 15px;
  padding: 15px;
}

.card {
  background: white;
  border-radius: 10px;
  padding: 10px;
  text-align: center;
  position: relative;
}

.badge {
  position: absolute;
  top: 10px;
  left: 10px;
  background: red;
  color: white;
  font-size: 12px;
  padding: 3px 6px;
  border-radius: 5px;
}

.card img {
  width: 100%;
  height: 150px;
  object-fit: contain;
}

.price {
  color: green;
  font-weight: bold;
  font-size: 18px;
}

.rating {
  color: orange;
}

.link {
  display: block;
  margin-top: 10px;
  padding: 10px;
  background: #00a650;
  color: white;
  text-decoration: none;
  border-radius: 5px;
  font-weight: bold;
}
</style>
</head>

<body>

<header>
  <h1>🔥 TOP OFERTAS DO DIA</h1>

  <div class="search-box">
    <input 
      type="text" 
      id="busca" 
      placeholder="Buscar produtos..."
      onkeypress="if(event.key==='Enter'){buscarClick()}"
    >
    <button onclick="buscarClick()">Buscar</button>
  </div>
</header>

<div class="urgencia">
  ⏰ Ofertas atualizadas! Promoções podem acabar em: <span id="timer"></span>
</div>

<div class="container" id="produtos"></div>

<script>

// =======================
// 🔥 CONFIG
// =======================

const afiliado = "https://www.mercadolivre.com.br/social/m999";

let buscas = [
  "mais vendidos",
  "ofertas tecnologia",
  "fone bluetooth",
  "acessórios moto",
  "smartwatch barato"
];

let indexBusca = 0;

// =======================
// ⏰ CONTADOR URGÊNCIA
// =======================

let tempo = 600;

function atualizarTimer() {
  let min = Math.floor(tempo / 60);
  let sec = tempo % 60;

  document.getElementById("timer").innerHTML =
    `${min}:${sec < 10 ? '0' : ''}${sec}`;

  tempo--;

  if (tempo >= 0) {
    setTimeout(atualizarTimer, 1000);
  } else {
    tempo = 600;
    atualizarTimer();
  }
}

// =======================
// ⭐ ESTRELAS
// =======================

function estrelas() {
  return "⭐⭐⭐⭐⭐";
}

// =======================
// 🔎 BUSCA PRINCIPAL
// =======================

function buscar(termo = "mais vendidos") {

  document.getElementById("produtos").innerHTML =
    "<p>Carregando ofertas...</p>";

  fetch(`https://api.mercadolibre.com/sites/MLB/search?q=${termo}&sort=sold_quantity_desc`)
    .then(res => res.json())
    .then(data => {

      let html = "";
      let top10 = data.results.slice(0, 10);

      top10.forEach((p, i) => {

        let linkAfiliado = `${afiliado}?url=${encodeURIComponent(p.permalink)}`;

        let badge = `<div class="badge">🔥 TOP ${i+1}</div>`;

        html += `
          <div class="card">
            ${badge}
            <img src="${p.thumbnail}" />
            <h4>${p.title}</h4>
            <div class="rating">${estrelas()}</div>
            <p class="price">R$ ${p.price}</p>
            <a class="link" href="${linkAfiliado}" target="_blank">
              🔥 COMPRAR AGORA
            </a>
          </div>
        `;
      });

      document.getElementById("produtos").innerHTML = html;
    })
    .catch(() => {
      document.getElementById("produtos").innerHTML =
        "<p>Erro ao carregar produtos.</p>";
    });
}

// =======================
// 🔘 BOTÃO BUSCA
// =======================

function buscarClick() {
  let termo = document.getElementById("busca").value.trim();
  if (termo === "") termo = "mais vendidos";
  buscar(termo);
}

// =======================
// 🔁 AUTO ATUALIZAÇÃO
// =======================

// Atualiza produtos a cada 5 minutos
setInterval(() => {
  buscar();
}, 300000);

// Troca automática de nicho a cada 20s
setInterval(() => {
  buscar(buscas[indexBusca]);
  indexBusca = (indexBusca + 1) % buscas.length;
}, 20000);

// =======================
// 🚀 INICIAR
// =======================

buscar();
atualizarTimer();

</script>

</body>
</html>
